sentence=Control CH224A/CH224K USB PD controller via I2C on M5Stack with USB PD PPS/AVS voltage adjustment
paragraph=This library provides control of CH224A/CH224K USB PD controllers via I2C on M5Stack (M5Unified compatible) with USB PD PPS/AVS voltage adjustment. Supports fixed voltage mode (5V/9V/12V/15V/20V/28V), PPS mode (5.0V～21.0V, 0.1V steps), and AVS mode (16-bit precision).
